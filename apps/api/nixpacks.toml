[phases.setup]
nixPkgs = ["nodejs_20"]

[phases.install]
cmds = [
  "npm install -g pnpm",
  "cd /app && pnpm install --frozen-lockfile"
]

[phases.build]
cmds = [
  "cd /app && pnpm --filter @worknest/api build",
  "cd /app/apps/api && npx prisma generate"
]

[start]
cmd = "cd /app/apps/api && npx prisma migrate deploy && node dist/index.js"
