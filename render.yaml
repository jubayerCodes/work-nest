# Render Blueprint — https://render.com/docs/blueprint-spec
# Deploy the full WorkNest stack with one click:
# Dashboard → New → Blueprint → connect repo → done.

databases:
  - name: worknest-db
    databaseName: worknest
    user: worknest
    plan: free
    region: oregon

services:
  # ── API Service (Express + Socket.io) ──────────────────────────────────────
  - type: web
    name: worknest-api
    plan: free
    env: node
    region: oregon
    rootDir: apps/api
    buildCommand: cd ../.. && npm install -g pnpm && pnpm install --frozen-lockfile --prod=false && cd apps/api && npx prisma generate && cd ../.. && pnpm --filter @worknest/api build
    startCommand: npx prisma migrate deploy && node dist/apps/api/src/index.js
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: worknest-db
          property: connectionString
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
      - key: JWT_ACCESS_EXPIRES_IN
        value: 1d
      - key: JWT_REFRESH_EXPIRES_IN
        value: 7d
      - key: EMAIL_FROM
        value: "WorkNest <onboarding@resend.dev>"
      # ⚠️ Set these manually in the Render dashboard after first deploy:
      - key: JWT_ACCESS_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: CLIENT_URL
        sync: false   # Set to your web service URL: https://worknest-web.onrender.com
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: RESEND_API_KEY
        sync: false

  # ── Web Service (Next.js) ──────────────────────────────────────────────────
  - type: web
    name: worknest-web
    plan: free
    env: node
    region: oregon
    rootDir: apps/web
    buildCommand: cd ../.. && npm install -g pnpm && pnpm install --frozen-lockfile --prod=false && NEXT_STANDALONE=true pnpm --filter @worknest/web build && mkdir -p apps/web/.next/standalone/apps/web/.next && cp -r apps/web/.next/static apps/web/.next/standalone/apps/web/.next/static && mkdir -p apps/web/.next/standalone/apps/web/public && (cp -r apps/web/public/. apps/web/.next/standalone/apps/web/public/ 2>/dev/null || true)
    startCommand: HOSTNAME=0.0.0.0 node .next/standalone/apps/web/server.js
    healthCheckPath: /
    envVars:
      - key: NEXT_STANDALONE
        value: true
      # ⚠️ Set these manually in the Render dashboard after first deploy:
      - key: NEXT_PUBLIC_API_URL
        sync: false   # Set to: https://worknest-api.onrender.com
      - key: NEXT_PUBLIC_SOCKET_URL
        sync: false   # Set to: https://worknest-api.onrender.com
